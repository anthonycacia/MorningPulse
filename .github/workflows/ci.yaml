name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Create CI env
        run: |
          printf "FOREX_API_KEY=test\nDISCORD_WEBHOOK_URL=https://example.com/test\n" > .env

      - name: Build container
        run: docker compose build

      - name: Start container
        run: docker compose up -d --wait

      - name: Health check
        run: |
          for i in {1..10}; do
            curl -sf http://localhost:8000/health/live && exit 0
            sleep 2
          done
          exit 1

      - name: Shutdown (always)
        if: always()
        run: docker compose down