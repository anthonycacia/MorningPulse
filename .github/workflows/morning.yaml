name: MorningPulse Scheduler

on:
  schedule:
    - cron: "0 10 * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Start service
        run: docker compose up -d --build

      - name: Wait for startup
        run: sleep 10

      - name: Trigger MorningPulse
        run: curl --fail -X POST http://localhost:8000/run/morning-pulse

      - name: Shutdown
        run: docker compose down